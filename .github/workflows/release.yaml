name: Release

permissions:
  contents: write
  packages: write

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v([0-9]{4})\.([0-9]{2})\.([0-9]+)$ ]]; then
            echo "Tag '${tag}' is invalid. Expected format: v2026.04.1" >&2
            exit 1
          fi

          {
            echo "tag=${tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build_push_1
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: false
          sbom: false
          build-args: |
            REPOSITORY=${{ github.repository }}

      - name: Wait before retry
        if: steps.build_push_1.outcome == 'failure'
        shell: bash
        run: sleep 20

      - name: Retry build and push image
        id: build_push_2
        if: steps.build_push_1.outcome == 'failure'
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: false
          sbom: false
          build-args: |
            REPOSITORY=${{ github.repository }}

      - name: Wait before final retry
        if: steps.build_push_1.outcome == 'failure' && steps.build_push_2.outcome == 'failure'
        shell: bash
        run: sleep 40

      - name: Final retry build and push image
        id: build_push_3
        if: steps.build_push_1.outcome == 'failure' && steps.build_push_2.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: false
          sbom: false
          build-args: |
            REPOSITORY=${{ github.repository }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          body: |
            Container release for `${{ steps.version.outputs.tag }}`.

            Published package:
            - `ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}`
            - `ghcr.io/${{ github.repository }}:latest`
